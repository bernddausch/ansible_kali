---
- name: "Installing useful github repos"
  git:
    repo: "{{ item.repo }}"
    dest: "{{ item.location }}"
  loop:
    - { repo: "https://github.com/Flangvik/SharpCollection", location: "/opt/repos/SharpCollection" }
    - { repo: "https://github.com/PowerShellMafia/PowerSploit.git", location: "/opt/repos/PowerSploit" }




